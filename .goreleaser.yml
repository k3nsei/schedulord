# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: "schedulord"

before:
  hooks:
    - "go mod tidy"
    - "go generate ./..."

builds:
  - main: "./cmd/schedulord"
    env:
      - "CGO_ENABLED=0"
    goos:
      - "darwin"
      - "linux"
      - "windows"
    goarch:
      - "amd64"
      - "arm64"
    flags:
      - "-trimpath"
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}"
    mod_timestamp: "{{ .CommitTimestamp }}"

dockers_v2:
  - images:
      - "ghcr.io/k3nsei/schedulord"
    dockerfile: "./.goreleaser/Containerfile"
    tags:
      - "latest"
      - "{{ .Tag }}"
    platforms:
      - "linux/amd64"
      - "linux/arm64"
    disable: "{{ .IsSnapshot }}"
    build_args:
      VERSION: "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Schedulord is a simple, configurable job scheduler written in Go, designed to run as a containerized service."
      "org.opencontainers.image.authors": "Piotr Stępniewski (k3nsei)"
      "org.opencontainers.image.vendor": "Piotr Stępniewski (k3nsei)"
      "org.opencontainers.image.licenses": "LicenseRef-Proprietary"
      "org.opencontainers.image.url": "{{ .GitURL }}"
      "org.opencontainers.image.documentation": "{{ .GitURL }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"

docker_digest:
  name_template: "{{ .ProjectName }}_digests.txt"
  disable: "{{ .IsSnapshot }}"

docker_signs:
  - cmd: cosign
    output: true
    args:
      - "sign"
      - "${artifact}"
      - "--yes"

archives:
  - id: "schedulord"
    formats: ["tar.xz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: "windows"
        formats: ["zip"]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: "sha256"

changelog:
  sort: "asc"
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
